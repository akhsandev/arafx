<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GROUPIFY — Pembagi Kelompok</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00f5ff;
    --cyan-dim: rgba(0,245,255,0.15);
    --cyan-glow: rgba(0,245,255,0.4);
    --male: #00c8ff;
    --male-dim: rgba(0,200,255,0.12);
    --female: #ff4db8;
    --female-dim: rgba(255,77,184,0.12);
    --bg: #050a14;
    --bg2: #080f1e;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(0,245,255,0.2);
    --text: #c8e8ff;
    --text-muted: rgba(200,232,255,0.45);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* PARALLAX HERO */
  .hero {
    position: relative;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .parallax-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Grid lines */
  .grid-bg {
    background-image:
      linear-gradient(rgba(0,245,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: perspective(600px) rotateX(20deg) scale(1.4);
    transform-origin: bottom center;
  }

  .horizon-glow {
    background: radial-gradient(ellipse 80% 40% at 50% 100%, rgba(0,245,255,0.12) 0%, transparent 70%);
  }

  .orb-left {
    background: radial-gradient(circle at 20% 50%, rgba(0,200,255,0.18) 0%, transparent 50%);
    animation: orbPulse 6s ease-in-out infinite;
  }

  .orb-right {
    background: radial-gradient(circle at 80% 50%, rgba(255,77,184,0.15) 0%, transparent 50%);
    animation: orbPulse 6s ease-in-out infinite 3s;
  }

  @keyframes orbPulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  /* Scanlines */
  .scanlines {
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
  }

  /* Stars */
  .stars { overflow: hidden; }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.8; }
  }

  .hero-content {
    position: relative;
    z-index: 10;
    text-align: center;
  }

  .hero-badge {
    display: inline-block;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--cyan);
    border: 1px solid var(--border);
    padding: 6px 20px;
    margin-bottom: 32px;
    background: var(--cyan-dim);
    animation: badgePulse 3s ease-in-out infinite;
  }

  @keyframes badgePulse {
    0%, 100% { box-shadow: 0 0 10px var(--cyan-glow); }
    50% { box-shadow: 0 0 24px var(--cyan-glow), 0 0 48px rgba(0,245,255,0.1); }
  }

  .hero-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(48px, 8vw, 100px);
    font-weight: 900;
    letter-spacing: 8px;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 40px var(--cyan-glow), 0 0 80px rgba(0,245,255,0.1);
    margin-bottom: 16px;
    animation: titleFlicker 8s ease-in-out infinite;
  }

  @keyframes titleFlicker {
    0%, 94%, 96%, 100% { text-shadow: 0 0 40px var(--cyan-glow), 0 0 80px rgba(0,245,255,0.1); }
    95% { text-shadow: 0 0 20px var(--cyan-glow); }
  }

  .hero-sub {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 6px;
    color: var(--text-muted);
    margin-bottom: 56px;
  }

  .scroll-indicator {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: float 2s ease-in-out infinite;
    cursor: pointer;
  }

  .scroll-indicator span {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-muted);
  }

  .scroll-arrow {
    width: 24px;
    height: 24px;
    border-right: 2px solid var(--cyan);
    border-bottom: 2px solid var(--cyan);
    transform: rotate(45deg);
    box-shadow: 3px 3px 8px var(--cyan-glow);
  }

  @keyframes float {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(8px); }
  }

  /* MAIN APP */
  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 80px 24px 120px;
  }

  .section-label {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--cyan);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* CONFIG ROW */
  .config-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    margin-bottom: 48px;
    align-items: end;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field-label {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .cyber-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    padding: 14px 20px;
    outline: none;
    width: 100%;
    transition: all 0.3s;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }

  .cyber-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 20px var(--cyan-dim), inset 0 0 20px rgba(0,245,255,0.03);
  }

  .cyber-input::placeholder { color: var(--text-muted); font-size: 14px; font-weight: 400; }

  /* NAME INPUTS */
  .gender-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 40px;
  }

  .gender-panel {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 24px;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 0 100%);
  }

  .gender-panel.male { border-color: rgba(0,200,255,0.3); }
  .gender-panel.female { border-color: rgba(255,77,184,0.3); }

  .gender-panel.male::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--male), transparent);
  }

  .gender-panel.female::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--female), transparent);
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .gender-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .male .gender-icon { background: var(--male-dim); border: 1px solid var(--male); color: var(--male); }
  .female .gender-icon { background: var(--female-dim); border: 1px solid var(--female); color: var(--female); }

  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 2px;
  }

  .male .panel-title { color: var(--male); }
  .female .panel-title { color: var(--female); }

  .count-badge {
    margin-left: auto;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .male .count-badge { background: var(--male-dim); color: var(--male); border: 1px solid rgba(0,200,255,0.3); }
  .female .count-badge { background: var(--female-dim); color: var(--female); border: 1px solid rgba(255,77,184,0.3); }

  .name-input-area {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    padding: 12px;
    resize: none;
    height: 160px;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.3s;
  }

  .name-input-area:focus { border-color: var(--border); }
  .male .name-input-area:focus { border-color: rgba(0,200,255,0.4); }
  .female .name-input-area:focus { border-color: rgba(255,77,184,0.4); }

  .name-input-area::placeholder { color: var(--text-muted); font-size: 13px; }

  .input-hint {
    margin-top: 8px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  /* ACTION */
  .action-row {
    display: flex;
    justify-content: center;
    margin-bottom: 60px;
    gap: 16px;
  }

  .cyber-btn {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    font-weight: 700;
    padding: 18px 52px;
    border: none;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    overflow: hidden;
  }

  .cyber-btn.primary {
    background: var(--cyan);
    color: #050a14;
  }

  .cyber-btn.primary:hover {
    box-shadow: 0 0 30px var(--cyan-glow), 0 0 60px rgba(0,245,255,0.1);
    transform: translateY(-2px);
  }

  .cyber-btn.primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
    pointer-events: none;
  }

  .cyber-btn.secondary {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .cyber-btn.secondary:hover {
    color: var(--text);
    border-color: var(--cyan);
  }

  .cyber-btn:active { transform: translateY(0) scale(0.98); }

  /* RESULTS */
  #results { display: none; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .results-stats {
    display: flex;
    gap: 24px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-val {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--cyan);
  }

  .stat-lbl {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-muted);
  }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .group-card {
    border: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(0,245,255,0.04) 0%, transparent 60%);
    padding: 0;
    position: relative;
    overflow: hidden;
    animation: cardReveal 0.5s ease forwards;
    opacity: 0;
  }

  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .group-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.6;
  }

  .group-card::after {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,245,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .group-head {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .group-num {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--cyan);
  }

  .group-tally {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .tally-male {
    font-size: 11px;
    color: var(--male);
    background: var(--male-dim);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .tally-female {
    font-size: 11px;
    color: var(--female);
    background: var(--female-dim);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .group-members {
    padding: 12px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .member {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    animation: memberIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes memberIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .member:last-child { border-bottom: none; }

  .member-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }

  .member-dot.m { background: var(--male); color: var(--male); }
  .member-dot.f { background: var(--female); color: var(--female); }

  .member-name {
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: var(--text);
  }

  .member-tag {
    margin-left: auto;
    font-size: 10px;
    letter-spacing: 1px;
    opacity: 0.5;
  }

  /* ERROR */
  .error-msg {
    display: none;
    font-size: 13px;
    letter-spacing: 1px;
    color: #ff4444;
    padding: 12px 20px;
    border: 1px solid rgba(255,68,68,0.3);
    background: rgba(255,68,68,0.05);
    margin-bottom: 24px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  /* Responsive */
  @media (max-width: 640px) {
    .gender-grid { grid-template-columns: 1fr; }
    .config-row { grid-template-columns: 1fr; }
    .hero-title { font-size: 42px; letter-spacing: 4px; }
  }
</style>
</head>
<body>

<!-- HERO SECTION -->
<section class="hero" id="hero">
  <div class="parallax-layer grid-bg" id="gridBg"></div>
  <div class="parallax-layer horizon-glow"></div>
  <div class="parallax-layer orb-left"></div>
  <div class="parallax-layer orb-right"></div>
  <div class="parallax-layer scanlines"></div>
  <div class="parallax-layer stars" id="stars"></div>

  <div class="hero-content">
    <div class="hero-badge">◈ SYSTEM ONLINE ◈</div>
    <h1 class="hero-title">GROUPIFY</h1>
    <p class="hero-sub">PEMBAGI KELOMPOK OTOMATIS</p>
  </div>

  <div class="scroll-indicator" onclick="document.getElementById('appSection').scrollIntoView({behavior:'smooth'})">
    <span>MULAI</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<!-- APP SECTION -->
<main class="app" id="appSection">

  <!-- Jumlah Kelompok -->
  <div class="section-label">◈ KONFIGURASI</div>
  <div class="config-row">
    <div class="field-group">
      <label class="field-label" for="numGroups">Jumlah Kelompok</label>
      <input class="cyber-input" type="number" id="numGroups" min="1" max="50" value="4" placeholder="Masukkan jumlah kelompok">
    </div>
  </div>

  <!-- Name Inputs -->
  <div class="section-label">◈ INPUT DATA PESERTA</div>
  <div class="gender-grid">
    <div class="gender-panel male">
      <div class="panel-header">
        <div class="gender-icon">♂</div>
        <span class="panel-title">LAKI-LAKI</span>
        <span class="count-badge" id="maleCount">0</span>
      </div>
      <textarea class="name-input-area" id="maleNames" placeholder="Masukkan nama&#10;satu per baris&#10;&#10;Contoh:&#10;Ahmad&#10;Budi&#10;Cahya"></textarea>
      <p class="input-hint">▸ Satu nama per baris</p>
    </div>

    <div class="gender-panel female">
      <div class="panel-header">
        <div class="gender-icon">♀</div>
        <span class="panel-title">PEREMPUAN</span>
        <span class="count-badge" id="femaleCount">0</span>
      </div>
      <textarea class="name-input-area" id="femaleNames" placeholder="Masukkan nama&#10;satu per baris&#10;&#10;Contoh:&#10;Siti&#10;Dewi&#10;Rina"></textarea>
      <p class="input-hint">▸ Satu nama per baris</p>
    </div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Action -->
  <div class="action-row">
    <button class="cyber-btn secondary" onclick="resetAll()">◈ RESET</button>
    <button class="cyber-btn primary" onclick="generateGroups()">BAGI KELOMPOK ▶</button>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="section-label">◈ HASIL PEMBAGIAN</div>
    <div class="results-header">
      <div class="results-stats">
        <div class="stat">
          <span class="stat-val" id="statGroups">0</span>
          <span class="stat-lbl">KELOMPOK</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="statTotal">0</span>
          <span class="stat-lbl">TOTAL</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="statMale" style="color:var(--male)">0</span>
          <span class="stat-lbl">LAKI-LAKI</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="statFemale" style="color:var(--female)">0</span>
          <span class="stat-lbl">PEREMPUAN</span>
        </div>
      </div>
    </div>
    <div class="groups-grid" id="groupsGrid"></div>
  </div>

</main>

<script>
  // === STARS ===
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width: ${size}px; height: ${size}px;
      top: ${Math.random() * 100}%;
      left: ${Math.random() * 100}%;
      --d: ${2 + Math.random() * 5}s;
      --delay: ${-Math.random() * 8}s;
    `;
    starsEl.appendChild(s);
  }

  // === PARALLAX ===
  const gridBg = document.getElementById('gridBg');
  window.addEventListener('scroll', () => {
    const sy = window.scrollY;
    gridBg.style.transform = `perspective(600px) rotateX(20deg) scale(1.4) translateY(${sy * 0.15}px)`;
  });

  // === LIVE COUNT ===
  function parseName(txt) {
    return txt.split('\n').map(n => n.trim()).filter(n => n.length > 0);
  }

  document.getElementById('maleNames').addEventListener('input', function() {
    document.getElementById('maleCount').textContent = parseName(this.value).length;
  });

  document.getElementById('femaleNames').addEventListener('input', function() {
    document.getElementById('femaleCount').textContent = parseName(this.value).length;
  });

  // === SHUFFLE ===
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // === DISTRIBUTE ===
  function distribute(names, numGroups) {
    const shuffled = shuffle(names);
    const groups = Array.from({ length: numGroups }, () => []);
    shuffled.forEach((name, i) => groups[i % numGroups].push(name));
    return groups;
  }

  // === GENERATE ===
  function generateGroups() {
    const numGroups = parseInt(document.getElementById('numGroups').value);
    const males = parseName(document.getElementById('maleNames').value);
    const females = parseName(document.getElementById('femaleNames').value);
    const errEl = document.getElementById('errorMsg');

    // Validation
    if (!numGroups || numGroups < 1) {
      showError('Masukkan jumlah kelompok yang valid.');
      return;
    }
    if (males.length + females.length === 0) {
      showError('Masukkan minimal satu nama peserta.');
      return;
    }
    if (numGroups > males.length + females.length) {
      showError(`Jumlah kelompok (${numGroups}) melebihi jumlah peserta (${males.length + females.length}).`);
      return;
    }

    errEl.style.display = 'none';

    // Distribute males & females separately, then merge per group
    const maleGroups = distribute(males, numGroups);
    const femaleGroups = distribute(females, numGroups);

    const grid = document.getElementById('groupsGrid');
    grid.innerHTML = '';

    for (let g = 0; g < numGroups; g++) {
      const mList = maleGroups[g].map(n => ({ name: n, gender: 'm' }));
      const fList = femaleGroups[g].map(n => ({ name: n, gender: 'f' }));
      const members = [...mList, ...fList];

      const card = document.createElement('div');
      card.className = 'group-card';
      card.style.animationDelay = `${g * 80}ms`;

      const membersHTML = members.map((m, mi) => `
        <div class="member" style="animation-delay: ${mi * 60 + g * 80}ms">
          <div class="member-dot ${m.gender}"></div>
          <span class="member-name">${escHtml(m.name)}</span>
          <span class="member-tag">${m.gender === 'm' ? '♂' : '♀'}</span>
        </div>
      `).join('');

      card.innerHTML = `
        <div class="group-head">
          <span class="group-num">KELOMPOK ${g + 1}</span>
          <div class="group-tally">
            ${mList.length > 0 ? `<span class="tally-male">♂ ${mList.length}</span>` : ''}
            ${fList.length > 0 ? `<span class="tally-female">♀ ${fList.length}</span>` : ''}
          </div>
        </div>
        <div class="group-members">${membersHTML}</div>
      `;

      grid.appendChild(card);
    }

    // Stats
    document.getElementById('statGroups').textContent = numGroups;
    document.getElementById('statTotal').textContent = males.length + females.length;
    document.getElementById('statMale').textContent = males.length;
    document.getElementById('statFemale').textContent = females.length;

    const resultsEl = document.getElementById('results');
    resultsEl.style.display = 'block';
    setTimeout(() => {
      resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  function resetAll() {
    document.getElementById('maleNames').value = '';
    document.getElementById('femaleNames').value = '';
    document.getElementById('numGroups').value = 4;
    document.getElementById('maleCount').textContent = '0';
    document.getElementById('femaleCount').textContent = '0';
    document.getElementById('results').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
