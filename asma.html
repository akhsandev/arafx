<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChemSpin Master - Lab Tata Nama Senyawa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- CUSTOM CSS ANIMATIONS --- */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body { font-family: 'Nunito', sans-serif; }
        
        /* Background Pulse */
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }
        .bg-pulse-1 { animation: pulse-slow 8s infinite alternate; }
        .bg-pulse-2 { animation: pulse-slow 10s infinite alternate-reverse; }

        /* Confetti */
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(120vh) rotate(720deg) scale(0.5); opacity: 0; }
        }
        .confetti { 
            position: fixed; 
            top: -50px; 
            width: 12px; 
            height: 24px; 
            border-radius: 2px; 
            z-index: 9999; 
            pointer-events: none; 
        }

        /* Popup Bouncing */
        @keyframes popup {
            0% { transform: scale(0.5) translateY(50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-popup { animation: popup 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Wheel Shadow & Lights */
        .wheel-shadow { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0.2), 0 0 50px rgba(0, 0, 0, 0.5); }
        .wheel-lights::before {
            content: ''; position: absolute; inset: -20px; border-radius: 50%;
            border: 4px dotted rgba(255,255,255,0.6);
            animation: rotate-lights 10s linear infinite;
        }
        @keyframes rotate-lights { 100% { transform: rotate(360deg); } }

        /* Button Shine Effect */
        @keyframes shine { 100% { left: 200%; } }
        .btn-shine-effect { position: absolute; inset: 0; width: 25%; background: rgba(255,255,255,0.3); transform: skewX(12deg); left: -100%; }
        .btn-hover-shine:hover .btn-shine-effect { animation: shine 1s ease-in-out; }

        /* Utilitas Teks Rumus (Subscript) */
        .formula-text sub { font-size: 0.6em; }
    </style>
</head>
<body class="min-h-screen bg-slate-900 overflow-x-hidden flex flex-col relative selection:bg-pink-400 selection:text-white text-slate-800">

                        MAIN LAGI

                    <div id="feedback-icon" class="shrink-0 self-center sm:self-start"></div>
                    <div class="text-center sm:text-left w-full">
                        <h4 id="feedback-title" class="font-black text-xl sm:text-2xl m-0"></h4>
                        <p id="feedback-desc" class="text-base sm:text-lg font-bold mt-1 sm:mt-2 m-0 formula-text"></p>

    <!-- MODAL POPUP -->
    <div id="modal-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
        <div class="bg-white rounded-[2rem] sm:rounded-[3rem] p-6 sm:p-12 max-w-lg w-full text-center shadow-[0_0_50px_rgba(255,255,255,0.2)] animate-popup border-[6px] sm:border-8 border-white/20 bg-clip-padding">
            <div class="w-16 h-16 sm:w-24 sm:h-24 mx-auto mb-4 sm:mb-6 bg-gradient-to-tr from-amber-300 to-orange-500 rounded-full flex items-center justify-center text-white shadow-xl shadow-orange-500/30">

            <h2 class="text-2xl sm:text-3xl font-black text-slate-800 mb-2 uppercase tracking-wide m-0">Berhasil Dikunci!</h2>
            
            <div class="my-4 sm:my-6 p-4 sm:p-8 bg-slate-50 rounded-2xl sm:rounded-3xl border-2 border-slate-100">

    <!-- Container Confetti -->
    <div id="confetti-container" class="fixed inset-0 pointer-events-none z-[9999] overflow-hidden"></div>

    <script>
        // --- DATA KIMIA ---
        const kations = [
            { name: 'Natrium', symbol: 'Na⁺', formula: 'Na', charge: 1, isPoly: false },
            { name: 'Kalsium', symbol: 'Ca²⁺', formula: 'Ca', charge: 2, isPoly: false },
            { name: 'Aluminium', symbol: 'Al³⁺', formula: 'Al', charge: 3, isPoly: false },
            { name: 'Besi(II)', symbol: 'Fe²⁺', formula: 'Fe', charge: 2, isPoly: false },
            // MENGGANTI Fe3+ MENJADI FOSFOR (P) 
            { name: 'Fosfor', symbol: 'P', formula: 'P', charge: 3, isPoly: false }, 
            { name: 'Amonium', symbol: 'NH₄⁺', formula: 'NH4', charge: 1, isPoly: true },
            { name: 'Magnesium', symbol: 'Mg²⁺', formula: 'Mg', charge: 2, isPoly: false },
            { name: 'Hidrogen', symbol: 'H⁺', formula: 'H', charge: 1, isPoly: false }
        ];

        const anions = [
            { name: 'Klorida', symbol: 'Cl⁻', formula: 'Cl', charge: 1, isPoly: false },
            { name: 'Nitrat', symbol: 'NO₃⁻', formula: 'NO3', charge: 1, isPoly: true },
            { name: 'Sulfat', symbol: 'SO₄²⁻', formula: 'SO4', charge: 2, isPoly: true },
            { name: 'Karbonat', symbol: 'CO₃²⁻', formula: 'CO3', charge: 2, isPoly: true },
            { name: 'Hidroksida', symbol: 'OH⁻', formula: 'OH', charge: 1, isPoly: true },
            { name: 'Fosfat', symbol: 'PO₄³⁻', formula: 'PO4', charge: 3, isPoly: true },
            { name: 'Sulfida', symbol: 'S²⁻', formula: 'S', charge: 2, isPoly: false },
            { name: 'Oksida', symbol: 'O²⁻', formula: 'O', charge: 2, isPoly: false }
        ];

        const colorsKation = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FDCB6E', '#6C5CE7', '#FF8ED4', '#00B894', '#E17055'];
        const colorsAnion = ['#1dd1a1', '#ff9ff3', '#feca57', '#54a0ff', '#00d2d3', '#ff6b6b', '#c8d6e5', '#ff9f43'];

        // --- AUDIO ENGINE ---
        class SoundEngine {
            constructor() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.enabled = true;
            }
            playTick() {
                if (!this.enabled || this.ctx.state === 'suspended') return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.05);
            }
            playTada() {
                if (!this.enabled) return;
                const notes = [440, 554.37, 659.25, 880];
                notes.forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                        osc.type = 'sine'; osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.6);
                        osc.connect(gain); gain.connect(this.ctx.destination);
                        osc.start(); osc.stop(this.ctx.currentTime + 0.6);
                    }, i === 3 ? 150 : i * 50); 
                });
            }
            playWin() {
                if (!this.enabled) return;
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                        osc.type = 'square'; osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                        osc.connect(gain); gain.connect(this.ctx.destination);
                        osc.start(); osc.stop(this.ctx.currentTime + 0.5);
                    }, i * 120);
                });
            }
            playLose() {
                if (!this.enabled) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.5);
            }
        }

        // --- STATE & GLOBAL VARS ---
        let soundEngine = null;
        let gameState = 'idle'; // idle, spin, kation_done, idle_anion, anion_done, challenge
        let wheelPhase = 'KATION';
        let wheelRot = 0;
        let score = 0;
        let selectedKation = null;
        let selectedAnion = null;

        // --- FUNGSI UTILITAS ---
        const subscriptMap = {'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'};
        const reverseSubscriptMap = {'₀':'0','₁':'1','₂':'2','₃':'3','₄':'4','₅':'5','₆':'6','₇':'7','₈':'8','₉':'9'};
        
        const toSubscript = (text) => text.replace(/[0-9]/g, m => subscriptMap[m]);
        const toNormalDigits = (text) => text.replace(/[₀-₉]/g, m => reverseSubscriptMap[m]);
        const formatFormulaHTML = (text) => toSubscript(text);
        const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
        
        const getCorrectFormula = (kation, anion) => {
            if (kation.formula === 'H' && anion.formula === 'OH') return 'H2O';
            const common = gcd(kation.charge, anion.charge);
            const kCount = anion.charge / common; const aCount = kation.charge / common;
            let kStr = kation.formula;
            if (kCount > 1 && kation.isPoly) kStr = `(${kStr})${kCount}`; else if (kCount > 1) kStr = `${kStr}${kCount}`;
            let aStr = anion.formula;
            if (aCount > 1 && anion.isPoly) aStr = `(${aStr})${aCount}`; else if (aCount > 1) aStr = `${aStr}${aCount}`;
            return `${kStr}${aStr}`;
        };

        // Fungsi baru untuk mendukung berbagai variasi nama yang benar
        const getCorrectNames = (kation, anion) => {
            let names = [];
            
            // Khusus Asam & Air
            if (kation.formula === 'H' && anion.formula === 'OH') {
                return ['air', 'hidrogen hidroksida', 'dihidrogen monoksida'];
            }
            if (kation.formula === 'H') {
                names.push(`asam ${anion.name.toLowerCase()}`);
                return names;
            }

            // Khusus Fosfor (Kovalen) - Menerima dengan dan tanpa awalan Yunani
            if (kation.formula === 'P') {
                const common = gcd(kation.charge, anion.charge);
                const kCount = anion.charge / common;
                const aCount = kation.charge / common;

                const getPrefix = (num) => {
                    if (num === 1) return 'mono';
                    if (num === 2) return 'di';
                    if (num === 3) return 'tri';
                    if (num === 4) return 'tetra';
                    if (num === 5) return 'penta';
                    return '';
                };

                const prefixK = kCount > 1 ? getPrefix(kCount) : '';
                const prefixA = aCount > 1 ? getPrefix(aCount) : ''; 
                
                let covName = `${prefixK}${kation.name.toLowerCase()} ${prefixA}${anion.name.toLowerCase()}`;
                if (covName.startsWith('mono')) covName = covName.substring(4); // Buang mono di depan
                
                names.push(covName.trim()); // Contoh: Difosfor trioksida
                names.push(`${kation.name.toLowerCase()} ${anion.name.toLowerCase()}`); // Contoh: Fosfor oksida (versi santai)
                names.push(`${kation.name.toLowerCase()}(iii) ${anion.name.toLowerCase()}`); // Contoh: Fosfor(III) oksida
            } else {
                // Standar Ionik Logam
                names.push(`${kation.name.toLowerCase()} ${anion.name.toLowerCase()}`);
            }

            return names;
        };

        // Logika penentuan jenis senyawa
        const getCorrectType = (kation, anion) => {
            if (kation.formula === 'H' && anion.formula === 'OH') return 'kovalen'; // Air
            if (kation.formula === 'P') return 'kovalen'; // Fosfor adalah Non-logam
            if (kation.formula === 'H') return 'asam'; // Diawali H+
            if (anion.formula === 'OH') return 'basa'; // Diakhiri OH-
            return 'ion'; // Logam/Amonium + Non-logam/Poliatomik
        };

        // --- MANIPULASI DOM ---
        function initApp() {
            soundEngine = new SoundEngine();
            renderWheel();

            document.getElementById('input-rumus').addEventListener('input', function(e) {
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = toSubscript(this.value);
                this.setSelectionRange(start, end);
            });
        }

        function toggleSound() {
            if (!soundEngine) return;
            if (soundEngine.ctx.state === 'suspended') soundEngine.ctx.resume();
            soundEngine.enabled = !soundEngine.enabled;
            
            document.getElementById('icon-sound-on').classList.toggle('hidden');
            document.getElementById('icon-sound-off').classList.toggle('hidden');
            
            if(!soundEngine.enabled) soundEngine.playTada(); 
        }

        function renderWheel() {
            const items = wheelPhase === 'KATION' ? kations : anions;
            const colors = wheelPhase === 'KATION' ? colorsKation : colorsAnion;
            const segmentAngle = 360 / items.length;
            
            const backgroundStr = items.map((_, i) => `${colors[i]} ${i * segmentAngle}deg ${(i + 1) * segmentAngle}deg`).join(', ');
            
            const wheelEl = document.getElementById('wheel');
            wheelEl.style.background = `conic-gradient(${backgroundStr})`;
            wheelEl.innerHTML = ''; 
            
            items.forEach((item, index) => {
                const rotation = index * segmentAngle + (segmentAngle / 2);
                const el = document.createElement('div');
                el.className = 'absolute w-full h-full flex items-start justify-center pt-3 sm:pt-8';
                el.style.transform = `rotate(${rotation}deg)`;
                
                const textContainer = document.createElement('div');
                textContainer.className = 'text-white font-black text-xl sm:text-4xl drop-shadow-[0_3px_3px_rgba(0,0,0,0.8)] text-center flex flex-col formula-text';
                textContainer.style.transform = 'rotate(180deg)';
                textContainer.innerHTML = formatFormulaHTML(item.symbol);
                
                el.appendChild(textContainer);
                wheelEl.appendChild(el);
            });

            const btn = document.getElementById('spin-btn');
            const title = document.getElementById('phase-title');
            
            if (wheelPhase === 'KATION') {
                btn.className = 'mt-8 sm:mt-12 relative overflow-hidden group btn-hover-shine text-lg sm:text-3xl font-black text-white px-8 sm:px-16 py-4 sm:py-6 rounded-full transition-all flex items-center justify-center gap-2 sm:gap-4 bg-gradient-to-r from-pink-500 to-rose-600 hover:scale-105 active:scale-95 shadow-[0_8px_0_#9f1239,0_15px_30px_rgba(225,29,72,0.6)] cursor-pointer border-0 w-full max-w-[280px] sm:max-w-none';
                title.innerHTML = 'Tahap 1:<br>Pilih Unsur/Ion 1';
                document.getElementById('spin-text').innerText = 'PUTAR UNSUR 1!';
            } else {
                btn.className = 'mt-8 sm:mt-12 relative overflow-hidden group btn-hover-shine text-lg sm:text-3xl font-black text-white px-8 sm:px-16 py-4 sm:py-6 rounded-full transition-all flex items-center justify-center gap-2 sm:gap-4 bg-gradient-to-r from-blue-500 to-cyan-500 hover:scale-105 active:scale-95 shadow-[0_8px_0_#1e3a8a,0_15px_30px_rgba(6,182,212,0.6)] cursor-pointer border-0 w-full max-w-[280px] sm:max-w-none';
                title.innerHTML = 'Tahap 2:<br>Pilih Unsur/Ion 2';
                document.getElementById('spin-text').innerText = 'PUTAR UNSUR 2!';
            }
        }

        function createConfetti() {
            const container = document.getElementById('confetti-container');
            container.innerHTML = '';
            const colors = ['#ff9ff3', '#feca57', '#48dbfb', '#1dd1a1', '#ff6b6b'];
            for(let i=0; i<80; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = `${Math.random() * 100}vw`;
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animation = `fall ${Math.random() * 2 + 2}s linear forwards`;
                conf.style.animationDelay = `${Math.random() * 0.5}s`;
                container.appendChild(conf);
            }
            setTimeout(() => { container.innerHTML = ''; }, 4000);
        }

        function handleSpin() {
            if (gameState.includes('spin')) return;
            if (soundEngine && soundEngine.ctx.state === 'suspended') soundEngine.ctx.resume();
            
            const isFirstSpin = wheelPhase === 'KATION';
            gameState = isFirstSpin ? 'spin1' : 'spin2';
            
            const btn = document.getElementById('spin-btn');
            btn.classList.add('bg-slate-600', 'scale-95', 'opacity-80', 'cursor-not-allowed', 'shadow-none');
            btn.classList.remove('hover:scale-105', 'active:scale-95');
            document.getElementById('spin-text').innerText = 'MENGACAK...';
            document.getElementById('spin-icon').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin sm:w-9 sm:h-9"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>';
            document.getElementById('phase-desc').innerText = 'Sedang mengacak...';

            const currentItems = isFirstSpin ? kations : anions;
            const segmentAngle = 360 / currentItems.length;
            const randomIndex = Math.floor(Math.random() * currentItems.length);
            const targetDeg = 360 - (randomIndex * segmentAngle + segmentAngle / 2);
            
            const extraSpins = (Math.floor(Math.random() * 3) + 6) * 360; 
            wheelRot += extraSpins + (targetDeg - (wheelRot % 360));

            const wheelEl = document.getElementById('wheel');
            wheelEl.style.transition = 'transform 4.2s cubic-bezier(0.15, 0.85, 0.15, 1)';
            wheelEl.style.transform = `rotate(${wheelRot}deg)`;

            let ticks = 0;
            const tickInterval = setInterval(() => {
                if(soundEngine) soundEngine.playTick();
                ticks++;
                if(ticks > 35) clearInterval(tickInterval);
            }, 100);

            setTimeout(() => {
                if(soundEngine) soundEngine.playTada();
                createConfetti();
                
                if (isFirstSpin) {
                    selectedKation = currentItems[randomIndex];
                    gameState = 'kation_done';
                    showModal('Unsur/Ion Pertama', selectedKation, 'text-pink-500', 'Satu unsur/ion berhasil didapatkan! Putar roda sekali lagi.', 'LANJUT UNSUR 2');
                } else {
                    selectedAnion = currentItems[randomIndex];
                    gameState = 'anion_done';
                    showModal('Unsur/Ion Kedua', selectedAnion, 'text-cyan-500', 'Kedua unsur/ion telah terkumpul! Saatnya ke meja lab untuk membentuk senyawanya.', 'MULAI TANTANGAN');
                }
            }, 4200);
        }

        function showModal(type, item, colorClass, desc, btnText) {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById('modal-type').innerText = type;
            
            const symEl = document.getElementById('modal-symbol');
            symEl.className = `text-7xl sm:text-8xl font-black mb-1 sm:mb-2 formula-text drop-shadow-md ${colorClass}`;
            symEl.innerHTML = formatFormulaHTML(item.symbol);
            
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-btn-text').innerText = btnText;
        }

        function nextPhase() {
            document.getElementById('modal-overlay').classList.add('hidden');
            
            if (gameState === 'kation_done') {
                wheelPhase = 'ANION';
                gameState = 'idle_anion';
                document.getElementById('phase-desc').innerText = 'Tekan tombol putar untuk mengacak roda lab!';
                document.getElementById('spin-icon').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none" class="sm:w-9 sm:h-9"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
                renderWheel(); 
            } else if (gameState === 'anion_done') {
                gameState = 'challenge';
                showChallengeMode();
            }
        }

        function showChallengeMode() {
            document.getElementById('header-text').classList.add('hidden');
            const wheelSec = document.getElementById('wheel-section');
            wheelSec.classList.add('scale-75', '-translate-y-10', 'opacity-50', 'blur-sm', 'pointer-events-none', 'absolute');
            
            document.getElementById('challenge-section').classList.remove('hidden');
            
            document.getElementById('c-kation-sym').innerHTML = formatFormulaHTML(selectedKation.symbol);
            document.getElementById('c-anion-sym').innerHTML = formatFormulaHTML(selectedAnion.symbol);
        }

        function checkAnswer() {
            const inputNama = document.getElementById('input-nama').value;
            const inputRumus = document.getElementById('input-rumus').value;
            const inputJenis = document.getElementById('input-jenis').value;
            
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackIcon = document.getElementById('feedback-icon');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackDesc = document.getElementById('feedback-desc');
            const btnCheck = document.getElementById('btn-check');
            const btnNext = document.getElementById('btn-next');

            feedbackArea.classList.remove('hidden', 'bg-emerald-100', 'border-emerald-500', 'bg-rose-100', 'border-rose-500', 'bg-amber-100', 'border-amber-500');

            if (!inputNama || !inputRumus || !inputJenis) {
                feedbackArea.classList.add('bg-amber-100', 'border-amber-500');
                feedbackIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-600 sm:w-10 sm:h-10"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>';
                feedbackTitle.className = 'font-black text-xl sm:text-2xl m-0 text-amber-800';
                feedbackTitle.innerText = 'Eits, Tunggu Dulu!';
                feedbackDesc.className = 'text-base sm:text-lg font-bold mt-1 sm:mt-2 m-0 text-amber-700';
                feedbackDesc.innerText = 'Harap isi kolom nama, rumus kimia, dan pilih jenis senyawanya ya!';
                return;
            }

            const correctNames = getCorrectNames(selectedKation, selectedAnion);
            const correctFormula = getCorrectFormula(selectedKation, selectedAnion);
            const correctType = getCorrectType(selectedKation, selectedAnion);

            // PENGECEKAN NAMA (Menerima beberapa variasi jawaban yang benar)
            const cleanInputName = inputNama.toLowerCase().replace(/[^a-z0-9()]/g, '');
            const isNameCorrect = correctNames.some(name => {
                const cleanCorrect = name.toLowerCase().replace(/[^a-z0-9()]/g, '');
                return cleanInputName === cleanCorrect;
            });

            // PENGECEKAN RUMUS
            const cleanInputFormula = toNormalDigits(inputRumus).replace(/\s+/g, '');
            const cleanCorrectFormula = correctFormula.replace(/\s+/g, '');
            const isFormulaCorrect = cleanInputFormula === cleanCorrectFormula;
            
            // PENGECEKAN JENIS SENYAWA
            const isTypeCorrect = inputJenis === correctType;
            
            const typeText = correctType.charAt(0).toUpperCase() + correctType.slice(1);
            
            if (isNameCorrect && isFormulaCorrect && isTypeCorrect) {
                score += 50;
                document.getElementById('score-display').innerText = score;
                
                feedbackArea.classList.add('bg-emerald-100', 'border-emerald-500');
                feedbackIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-600 sm:w-10 sm:h-10"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m9 12 2 2 4-4"></path></svg>';
                feedbackTitle.className = 'font-black text-xl sm:text-2xl m-0 text-emerald-800';
                feedbackTitle.innerText = 'LUAR BIASA! Jawabanmu Sempurna!';
                
                // Ambil variasi nama terbaik (yang paling awal di array) untuk ditampilkan
                const bestNameDisplay = correctNames[0].charAt(0).toUpperCase() + correctNames[0].slice(1);
                
                feedbackDesc.className = 'text-base sm:text-lg font-bold mt-1 sm:mt-2 m-0 formula-text text-emerald-700';
                feedbackDesc.innerHTML = `${bestNameDisplay} (${formatFormulaHTML(correctFormula)}) <br> <span class="text-sm opacity-80">✅ Senyawa ${typeText}</span>`;
                
                createConfetti();
                if(soundEngine) soundEngine.playWin();

                document.getElementById('input-nama').disabled = true;
                document.getElementById('input-rumus').disabled = true;
                document.getElementById('input-jenis').disabled = true;
                btnCheck.classList.add('hidden');
                btnNext.classList.remove('hidden');
                
            } else {
                feedbackArea.classList.add('bg-rose-100', 'border-rose-500');
                feedbackIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-rose-600 sm:w-10 sm:h-10"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
                feedbackTitle.className = 'font-black text-xl sm:text-2xl m-0 text-rose-800';
                feedbackTitle.innerText = 'Waduh, Masih Keliru!';
                feedbackDesc.className = 'text-base sm:text-lg font-bold mt-1 sm:mt-2 m-0 formula-text text-rose-700 leading-tight';
                
                const bestNameDisplay = correctNames[0].charAt(0).toUpperCase() + correctNames[0].slice(1);
                let feedbackMsg = `Kunci: <span class="text-blue-700">${bestNameDisplay}</span> <br/> Rumus: <span class="text-blue-700 font-mono">${formatFormulaHTML(correctFormula)}</span> <br/> Jenis: <span class="text-blue-700">Senyawa ${typeText}</span>`;
                
                feedbackDesc.innerHTML = feedbackMsg;
                
                if(soundEngine) soundEngine.playLose();
            }
        }

        function resetGame() {
            gameState = 'idle';
            wheelPhase = 'KATION';
            selectedKation = null;
            selectedAnion = null;
            
            document.getElementById('input-nama').value = '';
            document.getElementById('input-nama').disabled = false;
            document.getElementById('input-rumus').value = '';
            document.getElementById('input-rumus').disabled = false;
            document.getElementById('input-jenis').value = '';
            document.getElementById('input-jenis').disabled = false;
            
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('btn-check').classList.remove('hidden');
            document.getElementById('btn-next').classList.add('hidden');

            document.getElementById('challenge-section').classList.add('hidden');
            document.getElementById('header-text').classList.remove('hidden');
            
            const wheelSec = document.getElementById('wheel-section');
            wheelSec.classList.remove('scale-75', '-translate-y-10', 'opacity-50', 'blur-sm', 'pointer-events-none', 'absolute');
            
            document.getElementById('phase-desc').innerText = 'Tekan tombol putar untuk mengacak roda lab!';
            document.getElementById('spin-icon').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none" class="sm:w-9 sm:h-9"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
            
            const wheelEl = document.getElementById('wheel');
            wheelEl.style.transition = 'none'; 
            wheelRot = 0;
            wheelEl.style.transform = `rotate(0deg)`;
            
            setTimeout(() => { renderWheel(); }, 50);
        }

        window.onload = initApp;
    </script>
</body>
