<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Dokumentasi Aset - SMAN 1 Soppeng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        video { object-fit: cover; } /* Ini yang bikin preview full di layar 3:4 */
        #map { height: 110px; width: 110px; border-radius: 12px; border: 2px solid white; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-lg mx-auto bg-white min-h-screen shadow-2xl relative pb-24 border-x border-slate-100">
        <div class="bg-[#1e3a8a] text-white p-5 flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-4">
                <img src="https://arafx.vercel.app/logo.png" alt="Logo" class="w-12 h-12 drop-shadow-md">
                <div>
                    <h1 class="text-xl font-black tracking-tight uppercase">Dokumentasi Aset</h1>
                    <p class="text-xs text-blue-200 font-medium">UPT SMA NEGERI 1 SOPPENG</p>
                </div>
            </div>
        </div>

        <div class="relative w-full aspect-[3/4] bg-black overflow-hidden flex shadow-inner">
            <video id="videoElement" autoplay playsinline class="flex-grow h-full w-full"></video>
            <div id="uiMap" class="p-2 bg-white/90 backdrop-blur-sm rounded-xl shadow-xl absolute bottom-4 left-4 z-10 hidden border border-white/50">
                <div id="map"></div>
                <p id="uiLocation" class="text-center text-[10px] font-bold text-slate-700 mt-1 uppercase tracking-tighter">Mencari GPS...</p>
            </div>
        </div>

        <div class="p-6 space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase tracking-widest mb-2">Keterangan Aset / Nama Alat</label>
                <textarea id="keterangan" rows="3" class="w-full border-2 border-slate-300 rounded-xl p-3 focus:border-[#1e3a8a] focus:ring-0 outline-none transition-all text-sm bg-white font-medium text-slate-800 shadow-inner" placeholder="Tuliskan detail aset di sini..."></textarea>
            </div>
            
            <button id="captureBtn" class="w-full bg-[#1e3a8a] active:scale-95 text-white font-black py-4 px-6 rounded-2xl flex items-center justify-center gap-3 shadow-xl shadow-blue-200 transition-all uppercase tracking-wider">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                Ambil & Simpan Aset
            </button>
        </div>

        <div id="loading" class="hidden fixed inset-0 bg-[#1e3a8a]/90 backdrop-blur-md flex flex-col items-center justify-center z-50 text-white">
            <div class="w-16 h-16 border-4 border-white border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="font-bold tracking-widest animate-pulse uppercase text-sm">Memproses Gambar & Lokasi...</p>
        </div>

        <canvas id="canvas" class="hidden"></canvas>
    </div>

    <script>
        // Masukkan URL Web App Google Apps Script Anda di sini
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxyNxwlHW5Z3yz4gFAdQW6iaDZGDVqHgdzcdnMhjiwTjW85OtsoRnV1tS75MSNqWhYg/exec";
        
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('captureBtn');
        const ketInput = document.getElementById('keterangan');
        const loading = document.getElementById('loading');
        
        let currentLat = null, currentLong = null, map = null, marker = null;
        let logoImg = new Image();
        logoImg.crossOrigin = "Anonymous";
        logoImg.src = "https://arafx.vercel.app/logo.png";

        function formatTanggalIndo(date) {
            const hari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const bulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            return `${hari[date.getDay()]}, ${date.getDate()} ${bulan[date.getMonth()]} ${date.getFullYear()}`;
        }

        async function getStaticMapCentered(lat, lon, zoom, width, height) {
            const n = Math.pow(2, zoom);
            const x_f = (lon + 180) / 360 * n;
            const y_f = (1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * n;
            
            const centerTileX = Math.floor(x_f);
            const centerTileY = Math.floor(y_f);
            
            const offsetX = (x_f - centerTileX) * 256;
            const offsetY = (y_f - centerTileY) * 256;

            const mapCanvas = document.createElement('canvas');
            mapCanvas.width = width;
            mapCanvas.height = height;
            const mCtx = mapCanvas.getContext('2d');

            const startX = (width / 2) - offsetX;
            const startY = (height / 2) - offsetY;

            const promises = [];
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    const tileX = centerTileX + i;
                    const tileY = centerTileY + j;
                    const p = new Promise(resolve => {
                        const img = new Image();
                        img.crossOrigin = "Anonymous";
                        img.onload = () => resolve({img, i, j});
                        img.onerror = () => resolve({img: null, i, j});
                        img.src = `https://tile.openstreetmap.org/${zoom}/${tileX}/${tileY}.png`;
                    });
                    promises.push(p);
                }
            }

            const tiles = await Promise.all(promises);
            tiles.forEach(t => {
                if(t.img) {
                    mCtx.drawImage(t.img, startX + (t.i * 256), startY + (t.j * 256), 256, 256);
                }
            });

            return mapCanvas;
        }

        async function startCamera() {
            try {
                // Meminta resolusi tinggi (ideal: 1080p potret) agar tampilan di HP tidak buram
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1080 }, height: { ideal: 1440 } }
                });
                video.srcObject = stream;
            } catch (err) { alert("Akses kamera ditolak. Pastikan izin kamera aktif."); }
        }

        function startSensors() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((position) => {
                    currentLat = position.coords.latitude;
                    currentLong = position.coords.longitude;
                    document.getElementById('uiLocation').innerText = `${currentLat.toFixed(5)}, ${currentLong.toFixed(5)}`;
                    
                    if(!map) {
                        map = L.map('map', {zoomControl: false, attributionControl: false}).setView([currentLat, currentLong], 16);
                        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        marker = L.marker([currentLat, currentLong]).addTo(map);
                        document.getElementById('uiMap').classList.remove('hidden');
                    } else {
                        map.setView([currentLat, currentLong]);
                        marker.setLatLng([currentLat, currentLong]);
                    }
                }, null, { enableHighAccuracy: true });
            }
        }

        captureBtn.addEventListener('click', async () => {
            if (!ketInput.value) return alert("Isi keterangan foto dulu ya Pak!");
            if (currentLat === null) return alert("Menunggu GPS mendeteksi lokasi...");

            loading.classList.remove('hidden');

            // --- ASPEK RASIO: CROP & FIT LOGIC (Apa yang dilihat di preview = yang tercetak) ---
            
            // Tentukan target resolusi potret (3:4, lebar: 1080)
            const targetWidth = 1080;
            const targetHeight = 1440; // Tepat 4/3 dari lebar (1080)
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            // Hitung Dimensi Video Asli
            const sourceWidth = video.videoWidth;
            const sourceHeight = video.videoHeight;
            const sourceAR = sourceWidth / sourceHeight;
            
            // Tentukan Dimensi Target (3:4 Potret)
            const targetAR = targetWidth / targetHeight; // 0.75

            let sX, sY, sW, sH;

            // Logika CROP: Ambil potongan di tengah video asli agar jadi format potret 3:4
            if (sourceAR > targetAR) {
                // Video asli terlalu LEBAR (lanskap)
                sH = sourceHeight; // Tinggi penuh
                sW = sH * targetAR; // Lebar ikut rasio target
                sX = (sourceWidth - sW) / 2; // Potong kiri/kanan
                sY = 0;
            } else {
                // Video asli terlalu TINGGI (potret kaku/square)
                sW = sourceWidth; // Lebar penuh
                sH = sW / targetAR; // Tinggi ikut rasio target
                sX = 0;
                sY = (sourceHeight - sH) / 2; // Potong atas/bawah
            }

            // CROP VIDEO KE CANVAS
            ctx.drawImage(video, sX, sY, sW, sH, 0, 0, targetWidth, targetHeight);

            // --- SELESAI PERBAIKAN ASPEK RASIO ---

            // --- PERBAIKAN UTAMA: Setup Box Watermark ala Survey (Maksud Bapak adalah hasil foto di Drive) ---
            const boxWidth = canvas.width * 0.92;
            const boxHeight = 240;
            const boxX = (canvas.width - boxWidth) / 2;
            const boxY = canvas.height - boxHeight - 40;
            
            // PERBAIKAN: Background kotak watermark di foto diubah menjadi HITAM SEMI-TRANSPARAN (opacity 0.7) agar foto di belakangnya masih sedikit terlihat
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.roundRect ? ctx.fillRoundRect : ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
            ctx.lineWidth = 2;
            ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);

            // Gambar Teks Info (Teks tetap putih agar kontras)
            ctx.fillStyle = "white";
            ctx.font = "bold 32px Arial";
            ctx.fillText(ketInput.value.substring(0, 45), boxX + 30, boxY + 60);

            ctx.font = "24px Arial";
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.fillText(`Kec. Lalabata, Kabupaten Soppeng`, boxX + 30, boxY + 100);
            ctx.fillText(`Lat: ${currentLat.toFixed(6)} Long: ${currentLong.toFixed(6)}`, boxX + 30, boxY + 135);
            
            const timeStr = formatTanggalIndo(new Date());
            const nowTime = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
            ctx.fillText(`${timeStr} | ${nowTime} WITA`, boxX + 30, boxY + 175);
            ctx.font = "bold 20px Arial";
            ctx.fillStyle = "#60a5fa"; 
            ctx.fillText(`ASET UPT SMA NEGERI 1 SOPPENG`, boxX + 30, boxY + 210);

            if(logoImg.complete) {
                const logoSize = 140;
                ctx.drawImage(logoImg, boxX + boxWidth - logoSize - 30, boxY + 30, logoSize, logoSize);
            }
            
            // Peta Statis Terpusat
            const mapSize = 160;
            const mapCanvas = await getStaticMapCentered(currentLat, currentLong, 16, mapSize, mapSize);
            const mapPosX = boxX + boxWidth - mapSize - 200;
            const mapPosY = boxY + 45;
            
            ctx.fillStyle = "white";
            ctx.fillRect(mapPosX - 4, mapPosY - 4, mapSize + 8, mapSize + 8);
            
            ctx.drawImage(mapCanvas, mapPosX, mapPosY, mapSize, mapSize);
            
            ctx.fillStyle = "#ef4444"; 
            ctx.beginPath();
            ctx.arc(mapPosX + (mapSize / 2), mapPosY + (mapSize / 2), 8, 0, 2 * Math.PI);
            ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();

            // Kompres ke JPEG (Quality 0.6 untuk file < 200kb)
            const base64Image = canvas.toDataURL('image/jpeg', 0.6);

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        image: base64Image,
                        keterangan: ketInput.value,
                        lokasi: `${currentLat.toFixed(6)}, ${currentLong.toFixed(6)}`
                    }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                alert("Data Aset Berhasil Terkirim ke Drive!");
                ketInput.value = ""; 
            } catch (err) { alert("Terjadi kesalahan jaringan."); } 
            finally { loading.classList.add('hidden'); }
        });

        window.onload = () => { startCamera(); startSensors(); };
    </script>
</body>
</html>
